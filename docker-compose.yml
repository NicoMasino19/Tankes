services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 3001
      NET_CODEC: ${NET_CODEC:-msgpack}
    ports:
      - "${PORT:-3001}:3001"
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL:-}
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-8080}:80"
    restart: unless-stopped